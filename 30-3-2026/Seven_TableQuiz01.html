<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Time Table</title>
</head>
<body>
    <table border="2">
        <caption>Time Table</caption>
        <thead>
          <tr>
            <th>Days</th>
            <th colspan="3" ="2">Subject</th>
            
          </tr>
        </thead>
        <tbody>
      <tr>
        <th >Monday</th>
         <th >English </th>
          <th >Hindi </th>
          <th>Maths</th>
       </tr>
       <tr>
        <th>Tuesday</th>
         <th >English </th>
          <th >General Knowledge </th>
          <th>S.S.T</th>
       </tr>
       
       <tr>
        <th >Wednesday</th>
          <th >S.S.T </th>
          <th >Hindi </th>
          <th>English</th>
       </tr>
       <tr>
        <th >Thursday</th>
          <th >Maths </th>
          <th >English </th>
          <th>Science</th>
       </tr>
       <tr>
        <th >Friday</th>
          <th >S.S.T </th>
          <th >General Knowledge </th>
          <th>Maths</th>
       </tr>
       <tr>
        <th >Saturday</th>
          <th >English </th>
          <th >Hindi </th>
          <th>English</th>
       </tr>
   
    </tbody>
     
    <tfoot>
        <tr>
            <th colspan="4">-----End Of The Table------</th>
            
        </tr>
    </tfoot>

    </table>
    
</body>
</html>
