<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product table</title>
</head>
<body>
    <table border="2">
        <caption>Product table</caption>
        <thead>
          <tr>
            <th>Product Name</th>
            <th>Prize</th>
            <th>Quantity</th>
          </tr>
        </thead>
        <tbody>
      <tr>
        <th >Dettol</th>
         <th >80</th>
          <th >10</th>
       </tr>

        <tr>
        <th>marie gold</th>
         <th >10</th>
          <th >5</th>
       </tr>

        <tr>
        <th >cricket bat</th>
         <th >2</th>
          <th >100</th>
       </tr>
    </tbody>
     
    <tfoot>
        <tr>
            <th>Total</th>
            <th>950</th>
            <th>115</th>
        </tr>
    </tfoot>

    </table>
    
</body>
</html>
