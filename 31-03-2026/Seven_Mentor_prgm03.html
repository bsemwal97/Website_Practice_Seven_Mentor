<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>

    <div id="header" align="center"><h1>Registration Form</h1></div>
    <p>Please fill in the following details to register:</p>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password"><br><br>

        <label for="confirm_password">Confirm Password:</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password"><br><br>

       <label for="password">Phone no:+91</label>
        <input type="number" id="password" name="password" placeholder="Enter your password"><br><br>

        <label for="radio">Male</label>
        <input type="radio" id="male" name="radio" > 

        <label for="radio">Female</label>
        <input type="radio" id="female" name="radio" ><br><br>

        <label for="number">Age:</label>
        <input type="number" id="number" name="number" ><br><br>
        <input type="submit" >
    </form>
    
</body>
</html>
