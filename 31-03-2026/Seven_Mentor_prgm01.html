<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Login</h1>
    <form action="" method="">
    <label id="name">Enter Name:</label>
    <input type="text" id="name"placeholder="name" ><br><br>


     <label id="email">Enter Email:</label>
    <input type="email" id="email"value="abc@mail.com"><br><br>


     <label id="password">Enter Password:</label>
    <input type="password" id="password"><br><br>

    
     <label id="url">Enter URL:</label>
    <input type="url" id="url"><br><br>

    
      <label id="number" >Number:</label>
      <input type="number" id="number"><br><br>


     <label id="file">File:</label>
    <input type="file" id="file"><br><br>

     <label id="colour">Colour:</label>
    <input type="color" id="colour"><br><br>

     <label id="Date">Date:</label>
    <input type="date" id="Date"><br><br>

     <label id="time">Time:</label>
    <input type="time" id="time"><br><br>

     <label id="button">Button:</label>
    <input type="button" id="button"><br><br>

    <label="checkbox">Checkbox:</label>
    <input type="checkbox" id="checkbox"><br><br>

    <label type="radio" >radio:</label>
    <input type="radio" id="Radio"><br><br>

    <label id="range" >Range:</label>
    <input type="range" id="range"><br><br>
   
   
   
    <label id="reset"></label>
    <input type="reset" id="reset">


     <input type="submit"></label>

    </form>
</body>
</html>
