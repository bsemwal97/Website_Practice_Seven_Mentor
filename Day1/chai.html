<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <ul type="Square"><h3><b>Unordered list Chai</b></h3>
        <li>water</li>
        <li>Milk</li>
        <li>Tea</li>
        <li>Sugar</li>
        <li>Cardamom</li>
    </ul>

    <ol type="1" start="1"><h3><b>Ordered list Making</b></h3>
        <li>Light the gas</li>
        <li>Put the utensils</li>
        <li>Add water</li>
        <li>Boil the water</li>
        <li>Add Tea</li>
        <li>Add Sugar</li>
        <li>Wait till boil </li>
        <li>Pour Milk</li>
        <li>Pour it in tea cups</li>
    </ol>
</body>
</html>
