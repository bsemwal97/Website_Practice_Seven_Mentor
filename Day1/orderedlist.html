<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <ul type="Triangle"><h3><b>Unordered list Content</b></h3>
        <li>Html</li>
        <li>CSS</li>
        <li>Bootstrap</li>
        <li>JavaScript</li>
    </ul>

    <ol type="1" start="10"><h3><b>Ordered list Content</b></h3>
        <li>Html</li>
        <li>CSS</li>
        <li>Bootstrap</li>
        <li>JavaScript</li>
    </ol>
</body>
</html>
