<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li Before</title>
</head>
<body>
    <style>
        ul{
            list-style: none;
            padding-left:0;
        }
        ul li::before{
            content:"🔥";
            margin-right:8px;
        }
    </style>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    
</body>
</html>
